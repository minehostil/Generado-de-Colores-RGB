<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Generador de colores</title>
    <style>
        :root {
            --bg: #1e1b4b; 
            --panel: #2d2669; 
            --card: #3f368a; 
            --accent: #a78bfa; 
            --text: #f3f4f6;
            --subtext: #c4b5fd;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px; margin: 0;
            min-height: 100vh;
        }
        .container {
            background: var(--panel);
            padding: 25px; border-radius: 20px;
            width: 100%; max-width: 600px;
            border: 1px solid #4c1d95;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            margin-bottom: 30px;
        }
        h1 { 
            text-align: center; 
            color: var(--accent); 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            margin-top: 0;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.4);
        }
        
        input[type="text"], select {
            width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #4c1d95;
            background: #1e1b4b; color: white; margin-bottom: 15px; font-size: 1rem; box-sizing: border-box;
        }
        label { display: block; margin-bottom: 8px; font-size: 0.8rem; color: var(--subtext); font-weight: bold; text-transform: uppercase;}

        .formatting-group {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 20px;
        }
        @media (min-width: 480px) { .formatting-group { grid-template-columns: repeat(4, 1fr); } }
        
        .format-btn {
            background: var(--card); border: 1px solid #ffffff33; color: var(--text);
            padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.8rem; transition: 0.2s;
        }
        .format-btn.active { background: var(--accent); color: #1e1b4b; border-color: var(--accent); }

        .presets-group {
            display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; justify-content: center;
        }
        .preset-btn {
            padding: 6px 12px; border-radius: 20px; border: 1px solid var(--accent); background: transparent;
            color: var(--accent); font-size: 0.75rem; cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        .preset-btn:hover { background: var(--accent); color: #1e1b4b; }

        .color-list-container { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        .color-item { display: flex; align-items: center; background: var(--card); padding: 8px; border-radius: 10px; }
        .color-block { flex-grow: 1; height: 35px; border-radius: 6px; border: 1px solid #fff3; cursor: pointer; margin: 0 10px; display: flex; align-items: center; padding-left: 10px; font-family: monospace; text-shadow: 1px 1px 1px #000; font-size: 0.9rem; }
        .add-color-btn { background: rgba(167, 139, 250, 0.1); border: 1px dashed var(--accent); color: var(--accent); padding: 10px; width: 100%; border-radius: 10px; cursor: pointer; font-weight: bold; margin-bottom: 20px; }
        .remove-btn { background: none; border: none; color: #ff5555; font-size: 1.5rem; cursor: pointer; padding: 0 10px; }

        .preview-area { background: #000; padding: 25px; border-radius: 15px; text-align: center; font-size: 1.6rem; min-height: 40px; border: 1px solid #2d2669; margin-bottom: 15px; word-wrap: break-word; }
        
        .output-container { position: relative; }
        .output-box { background: #0c0a09; padding: 15px; border-radius: 10px; font-family: monospace; color: #4ade80; border: 1px solid #4c1d95; cursor: pointer; word-break: break-all; width: 100%; box-sizing: border-box; min-height: 50px; }
        .copy-toast { position: absolute; top: -35px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #1e1b4b; padding: 5px 15px; border-radius: 5px; font-size: 0.8rem; font-weight: bold; opacity: 0; transition: 0.3s; pointer-events: none; z-index: 10; }
        .copy-toast.show { opacity: 1; top: -45px; }

        .footer { 
            margin-top: auto; padding: 20px; color: var(--subtext); font-size: 0.85rem; 
            letter-spacing: 0.5px; opacity: 0.7; text-align: center;
        }
        .visit-counter { margin-top: 10px; display: block; }
        .visit-counter img { opacity: 0.6; filter: hue-rotate(240deg); }

        .modal-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.7); z-index: 1000; backdrop-filter: blur(3px); }
        .modal { display: none; position: fixed; top:50%; left:50%; transform: translate(-50%, -50%); background: var(--panel); padding: 20px; border-radius: 20px; z-index: 1001; width: 90%; max-width: 320px; border: 2px solid var(--accent); box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .picker-container { display: flex; gap: 10px; height: 150px; margin-bottom: 15px; touch-action: none; }
        .hs-map { flex: 1; position: relative; background: linear-gradient(to top, #fff, transparent), linear-gradient(to right, #f00 0%, #ff0 17%, #0f0 33%, #0ff 50%, #00f 67%, #f0f 83%, #f00 100%); border-radius: 5px; border: 1px solid #fff2; }
        .v-bar { width: 30px; background: linear-gradient(to bottom, #fff, #000); border-radius: 5px; position: relative; border: 1px solid #fff2; }
        .cursor { position: absolute; width: 12px; height: 12px; border: 2px solid white; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; box-shadow: 0 0 4px #000; }
        .hex-input-manual { width: 100%; padding: 10px; background: rgba(0,0,0,0.3); border: 1px solid var(--accent); color: white; text-align: center; border-radius: 8px; margin-bottom: 15px; font-family: monospace; font-size: 1.1rem; }
        .close-modal { width: 100%; padding: 12px; background: var(--accent); border: none; border-radius: 10px; color: #1e1b4b; font-weight: bold; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="container">
    <h1>Generador de colores</h1>
    
    <label>Texto del Mensaje</label>
    <input type="text" id="inputText" value="Ejemplo" oninput="update()">

    <label>Estilos de Texto</label>
    <div class="formatting-group">
        <button class="format-btn" onclick="toggleFormat('b', this)">Negrita</button>
        <button class="format-btn" onclick="toggleFormat('i', this)">Itálica</button>
        <button class="format-btn" onclick="toggleFormat('u', this)">Subrayado</button>
        <button class="format-btn" onclick="toggleFormat('s', this)">Tachado</button>
    </div>

    <label>Preajustes de Colores</label>
    <div class="presets-group">
        <button class="preset-btn" onclick="applyPreset(['#FF0000', '#FF7F00', '#FFFF00', '#00FF00', '#0000FF', '#4B0082', '#9400D3'])">Arcoíris</button>
        <button class="preset-btn" onclick="applyPreset(['#ff512f', '#dd2476', '#6a11cb'])">Atardecer</button>
        <button class="preset-btn" onclick="applyPreset(['#2193b0', '#6dd5ed', '#06beb6'])">Océano</button>
        <button class="preset-btn" onclick="applyPreset(['#f12711', '#f5af19'])">Fuego</button>
        <button class="preset-btn" onclick="applyPreset(['#00f2fe', '#4facfe', '#7000ff'])">Cyberpunk</button>
    </div>

    <label>Colores del Degradado</label>
    <div id="colorList" class="color-list-container"></div>
    <button class="add-color-btn" onclick="addColor()">+ AÑADIR COLOR</button>

    <label>Formato Minecraft</label>
    <select id="formatSelect" onchange="update()">
        <option value="minehostilnick">Simple (#rrggbb)</option>
        <option value="legacy">Legacy (&x&r&g&b...)</option>
        <option value="extra">Extra (&#rrggbb)</option>
        <option value="minimessage">MiniMessage</option>
        <option value="json">JSON (Tellraw)</option>
    </select>

    <div class="preview-area" id="preview"></div>
    
    <div class="output-container">
        <div id="copyToast" class="copy-toast">¡Texto copiado!</div>
        <div class="output-box" id="output" onclick="copyText()"></div>
    </div>
    <p style="text-align:center; font-size:0.8rem; color:var(--subtext); margin-top:10px">Haz clic en el código para copiar</p>
</div>

<div class="footer">
    © Desarrollado por Minehostil
    <div class="visit-counter">
        <a href="https://www.cutercounter.com/" target="_blank">
            <img src="https://www.cutercounter.com/hits.php?id=gvxpqnq&nd=5&style=1" border="0" alt="contador de visitas">
        </a>
    </div>
</div>

<div id="modalOverlay" class="modal-overlay" onclick="closePicker()"></div>
<div id="colorModal" class="modal">
    <div class="picker-container">
        <div id="hsMap" class="hs-map" onmousedown="startMove(event, 'hs')" ontouchstart="startMove(event, 'hs')">
            <div id="hsCursor" class="cursor"></div>
        </div>
        <div id="vBar" class="v-bar" onmousedown="startMove(event, 'v')" ontouchstart="startMove(event, 'v')">
            <div id="vCursor" class="cursor" style="left: 50%"></div>
        </div>
    </div>
    <label style="text-align: center; display: block;">Código HEX manual</label>
    <input type="text" id="hexManual" class="hex-input-manual" maxlength="7">
    <button class="close-modal" onclick="closePicker()">Guardar Color</button>
</div>

<script>
    let colors = ['#a78bfa', '#6366f1'];
    let formats = { b: false, i: false, u: false, s: false };
    let activeIndex = 0;
    let hsv = { h: 260, s: 50, v: 100 };

    function renderColors() {
        const container = document.getElementById('colorList');
        container.innerHTML = '';
        colors.forEach((c, i) => {
            const div = document.createElement('div');
            div.className = 'color-item';
            div.innerHTML = `
                <span style="width:20px; font-size:0.8rem; color: #aaa;">${i+1}</span>
                <div class="color-block" style="background:${c}" onclick="openPicker(${i})">${c.toUpperCase()}</div>
                ${colors.length > 2 ? `<button class="remove-btn" onclick="removeColor(${i})">&times;</button>` : '<div style="width:35px"></div>'}
            `;
            container.appendChild(div);
        });
        update();
    }

    function applyPreset(presetColors) {
        colors = [...presetColors];
        renderColors();
    }

    function addColor() { colors.push(colors[colors.length-1]); renderColors(); }
    function removeColor(i) { if(colors.length > 2) { colors.splice(i, 1); renderColors(); } }
    function toggleFormat(f, btn) { formats[f] = !formats[f]; btn.classList.toggle('active'); update(); }

    function openPicker(i) {
        activeIndex = i;
        const rgb = hexToRgb(colors[i]);
        const res = rgbToHsv(rgb.r, rgb.g, rgb.b);
        hsv = { h: res.h, s: res.s, v: res.v };
        document.getElementById('hexManual').value = colors[i].toUpperCase();
        updatePickerUI();
        document.getElementById('modalOverlay').style.display = 'block';
        document.getElementById('colorModal').style.display = 'block';
    }

    function closePicker() {
        document.getElementById('modalOverlay').style.display = 'none';
        document.getElementById('colorModal').style.display = 'none';
        renderColors();
    }

    function updatePickerUI(skipManual = false) {
        document.getElementById('hsCursor').style.left = (hsv.h/360*100) + '%';
        document.getElementById('hsCursor').style.top = (100 - hsv.s) + '%';
        document.getElementById('vCursor').style.top = (100 - hsv.v) + '%';
        const rgb = hsvToRgb(hsv.h, hsv.s, hsv.v);
        const hex = rgbToHex(rgb.r, rgb.g, rgb.b);
        colors[activeIndex] = hex;
        if(!skipManual) document.getElementById('hexManual').value = hex.toUpperCase();
        update();
    }

    function startMove(e, type) {
        const move = (ev) => {
            ev.preventDefault();
            const rect = (type === 'hs' ? document.getElementById('hsMap') : document.getElementById('vBar')).getBoundingClientRect();
            const clientX = ev.touches ? ev.touches[0].clientX : ev.clientX;
            const clientY = ev.touches ? ev.touches[0].clientY : ev.clientY;
            let x = (clientX - rect.left) / rect.width;
            let y = (clientY - rect.top) / rect.height;
            x = Math.max(0, Math.min(1, x)); y = Math.max(0, Math.min(1, y));
            if(type === 'hs') { hsv.h = x * 360; hsv.s = (1 - y) * 100; }
            else { hsv.v = (1 - y) * 100; }
            updatePickerUI();
        };
        const stop = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', stop); window.removeEventListener('touchmove', move); window.removeEventListener('touchend', stop); };
        window.addEventListener('mousemove', move); window.addEventListener('mouseup', stop);
        window.addEventListener('touchmove', move, {passive: false}); window.addEventListener('touchend', stop);
        move(e);
    }

    document.getElementById('hexManual').oninput = function() {
        let val = this.value;
        if(!val.startsWith('#')) val = '#' + val;
        if(/^#[0-9A-F]{6}$/i.test(val)) {
            const rgb = hexToRgb(val);
            const res = rgbToHsv(rgb.r, rgb.g, rgb.b);
            hsv = { h: res.h, s: res.s, v: res.v };
            updatePickerUI(true);
        }
    };

    function update() {
        const text = document.getElementById('inputText').value || "Ejemplo";
        const mode = document.getElementById('formatSelect').value;
        let html = "", code = "", jsonArr = [];
        let styles = (formats.b ? 'font-weight:bold;' : '') + (formats.i ? 'font-style:italic;' : '') + (formats.u ? 'text-decoration:underline;' : '') + (formats.s ? 'text-decoration:line-through;' : '');
        let mcCodes = (formats.b ? '&l' : '') + (formats.i ? '&o' : '') + (formats.u ? '&n' : '') + (formats.s ? '&m' : '');

        for (let i = 0; i < text.length; i++) {
            const ratio = text.length > 1 ? i / (text.length - 1) : 0;
            const rgb = interpolate(ratio);
            const hex = rgbToHex(rgb.r, rgb.g, rgb.b);
            html += `<span style="color:${hex};${styles}">${text[i]}</span>`;
            
            if(mode === 'minehostilnick') code += `${hex}${mcCodes}${text[i]}`;
            else if(mode === 'legacy') code += '&x' + hex.substring(1).split('').map(c=>'&'+c).join('') + mcCodes + text[i];
            else if(mode === 'extra') code += `&#${hex.substring(1)}${mcCodes}${text[i]}`;
            else if(mode === 'minimessage') code += `<${hex}>${text[i]}`;
            else if(mode === 'json') jsonArr.push({"text":text[i], "color":hex, "bold":formats.b, "italic":formats.i, "underlined":formats.u, "strikethrough":formats.s});
        }
        document.getElementById('preview').innerHTML = html;
        document.getElementById('output').innerText = (mode === 'json') ? JSON.stringify(["", ...jsonArr]) : code;
    }

    function copyText() {
        const text = document.getElementById('output').innerText;
        if(!text) return;
        const el = document.createElement('textarea');
        el.value = text;
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
        const toast = document.getElementById('copyToast');
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);
    }

    function hexToRgb(h) { return { r: parseInt(h.slice(1,3),16), g: parseInt(h.slice(3,5),16), b: parseInt(h.slice(5,7),16) }; }
    function rgbToHex(r,g,b) { return "#" + [r,g,b].map(x => x.toString(16).padStart(2,'0')).join(''); }
    function hsvToRgb(h, s, v) { s/=100; v/=100; let f=(n,k=(n+h/60)%6)=>v*(1-s*Math.max(Math.min(k,4-k,1),0)); return {r:Math.round(f(5)*255), g:Math.round(f(3)*255), b:Math.round(f(1)*255)}; }
    function rgbToHsv(r, g, b) { r/=255; g/=255; b/=255; let max=Math.max(r,g,b), min=Math.min(r,g,b), d=max-min, h, s=(max===0?0:d/max), v=max; if(max===min) h=0; else { if(max===r) h=(g-b)/d+(g<b?6:0); else if(max===g) h=(b-r)/d+2; else h=(r-g)/d+4; h/=6; } return {h:h*360, s:s*100, v:v*100}; }
    function interpolate(r) {
        const n = colors.length - 1;
        const pos = r * n;
        const i = Math.min(n - 1, Math.floor(pos));
        const c1 = hexToRgb(colors[i]), c2 = hexToRgb(colors[i+1]);
        const f = pos - i;
        return { r: Math.round(c1.r+(c2.r-c1.r)*f), g: Math.round(c1.g+(c2.g-c1.g)*f), b: Math.round(c1.b+(c2.b-c1.b)*f) };
    }

    renderColors();
</script>
</body>
</html>
